<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="CodeArmy logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#132238"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  
  <!-- Code lines -->
  <g fill="#f8fafc" opacity="0.95">
    <rect x="28" y="40" width="52" height="8" rx="2"/>
    <rect x="28" y="56" width="44" height="8" rx="2"/>
    <rect x="28" y="72" width="36" height="8" rx="2"/>
  </g>
  
  <!-- Accent circle (campaign node) -->
  <circle cx="94" cy="72" r="14" fill="url(#accent)"/>
  
  <!-- Connection lines -->
  <path d="M76 76h8" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Plus/connection icon inside circle -->
  <g stroke="#132238" stroke-width="4" stroke-linecap="round">
    <line x1="94" y1="64" x2="94" y2="80"/>
    <line x1="86" y1="72" x2="102" y2="72"/>
  </g>
</svg>
